<style>
  :root {
    --black: #080808;
    --black2: #111111;
    --black3: #1a1a1a;
    --border: #222222;
    --border2: #2e2e2e;
    --lime: #C7FF3C;
    --lime-dim: rgba(199,255,60,0.08);
    --lime-dim2: rgba(199,255,60,0.15);
    --white: #f0f0f0;
    --white-dim: rgba(240,240,240,0.5);
    --white-dimmer: rgba(240,240,240,0.2);
    --red: #ff4444;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--black);
    color: var(--white);
    font-family: var(--font-body);
    height: 100%;
    overflow: hidden;
  }

  /* LAYOUT */
  .app {
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    height: 100vh;
    max-width: 860px;
    margin: 0 auto;
    padding: 0 20px;
  }

  /* HEADER */
  .header {
    padding: 28px 0 0;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .logo {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .logo-mark {
    font-family: var(--font-display);
    font-size: 38px;
    letter-spacing: 3px;
    line-height: 1;
    color: var(--white);
  }

  .logo-mark span {
    color: var(--lime);
  }

  .logo-sub {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--white-dim);
    text-transform: uppercase;
  }

  .status-dot {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--white-dim);
    letter-spacing: 1px;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--lime);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    margin: 24px 0 0;
    border-bottom: 1px solid var(--border);
  }

  .tab {
    padding: 12px 24px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--white-dim);
    cursor: pointer;
    border: none;
    background: transparent;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.2s;
    position: relative;
  }

  .tab:hover { color: var(--white); }

  .tab.active {
    color: var(--lime);
    border-bottom-color: var(--lime);
  }

  .tab-badge {
    display: inline-block;
    margin-left: 8px;
    padding: 1px 6px;
    background: var(--lime-dim);
    border: 1px solid rgba(199,255,60,0.2);
    border-radius: 2px;
    font-size: 9px;
    color: var(--lime);
    vertical-align: middle;
  }

  /* CHAT */
  .chat-area {
    overflow-y: auto;
    padding: 24px 0;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* MESSAGES */
  .message {
    display: flex;
    flex-direction: column;
    gap: 8px;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { align-items: flex-end; }
  .message.assistant { align-items: flex-start; }

  .msg-label {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--white-dimmer);
    padding: 0 4px;
  }

  .msg-bubble {
    max-width: 82%;
    padding: 14px 18px;
    border-radius: 2px;
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-wrap;
  }

  .message.user .msg-bubble {
    background: var(--lime);
    color: #080808;
    font-weight: 600;
    border-radius: 2px 2px 0 2px;
  }

  .message.assistant .msg-bubble {
    background: var(--black3);
    border: 1px solid var(--border);
    color: var(--white);
    border-radius: 2px 2px 2px 0;
  }

  /* Markdown-like formatting in assistant messages */
  .msg-bubble strong { color: var(--lime); font-weight: 700; }
  .msg-bubble em { color: var(--white-dim); font-style: italic; }
  .msg-bubble code {
    font-family: var(--font-mono);
    font-size: 12px;
    background: var(--black2);
    border: 1px solid var(--border2);
    padding: 1px 5px;
    border-radius: 2px;
    color: var(--lime);
  }

  /* WELCOME */
  .welcome {
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding: 12px 0 24px;
    animation: fadeUp 0.4s ease;
  }

  .welcome-title {
    font-family: var(--font-display);
    font-size: 52px;
    letter-spacing: 2px;
    line-height: 0.95;
    color: var(--white);
  }

  .welcome-title span { color: var(--lime); }

  .welcome-desc {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--white-dim);
    line-height: 1.8;
    max-width: 500px;
    letter-spacing: 0.5px;
  }

  .welcome-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 4px;
  }

  .chip {
    padding: 8px 14px;
    border: 1px solid var(--border2);
    border-radius: 2px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--white-dim);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    background: transparent;
  }

  .chip:hover {
    border-color: var(--lime);
    color: var(--lime);
    background: var(--lime-dim);
  }

  /* TYPING INDICATOR */
  .typing {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 14px 18px;
    background: var(--black3);
    border: 1px solid var(--border);
    border-radius: 2px 2px 2px 0;
    width: fit-content;
  }

  .typing-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--lime);
    animation: typingBounce 1.2s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* INPUT AREA */
  .input-area {
    padding: 16px 0 24px;
    border-top: 1px solid var(--border);
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .input-box {
    flex: 1;
    background: var(--black3);
    border: 1px solid var(--border2);
    border-radius: 2px;
    padding: 13px 16px;
    color: var(--white);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.5;
    resize: none;
    min-height: 50px;
    max-height: 160px;
    outline: none;
    transition: border-color 0.2s;
    overflow-y: auto;
  }

  .input-box::placeholder { color: var(--white-dimmer); }
  .input-box:focus { border-color: var(--border2); }
  .input-box:focus-within { border-color: rgba(199,255,60,0.3); }

  .send-btn {
    width: 50px;
    height: 50px;
    background: var(--lime);
    border: none;
    border-radius: 2px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .send-btn:hover { background: #d4ff55; transform: translateY(-1px); }
  .send-btn:active { transform: translateY(0); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }

  .send-btn svg { color: #080808; }

  .input-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
    padding: 0 2px;
  }

  .input-hint {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--white-dimmer);
    letter-spacing: 0.5px;
  }

  .clear-btn {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--white-dimmer);
    background: none;
    border: none;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: color 0.2s;
  }

  .clear-btn:hover { color: var(--red); }

  /* SCROLLBAR */
  * { scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }

  /* DIVIDER */
  .mode-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 4px 0;
  }

  .mode-divider-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .mode-divider-text {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--white-dimmer);
    text-transform: uppercase;
  }

  @media (max-width: 600px) {
    .app { padding: 0 16px; }
    .welcome-title { font-size: 36px; }
    .tab { padding: 10px 14px; font-size: 10px; }
    .msg-bubble { max-width: 92%; font-size: 13px; }
  }
</style>
</head>

const SYSTEM_ESTRATEGIA = `Você é o assistente estratégico do Projeto ASC, criado por Lawderson. Você fala com a voz e a lógica do método. Tom direto. Sem enrolação. Sem conteúdo genérico. Sem frases motivacionais vazias.

Você é um consultor, não um atendente. Diagnostique antes de prescrever. Responda sempre em português brasileiro.

## 1. PRIMEIRO PASSO SEMPRE: ENTENDER O CLIENTE

Antes de gerar qualquer entregável, faça estas perguntas (pode fazer de uma vez, em formato de lista limpa):

1. Nicho: O que você vende ou entrega? (Serviço, consultoria, produto digital, infoproduto?)
2. Público: Quem é o seu cliente ideal? Qual a dor principal dele?
3. Diferencial: Você já tem uma solução estruturada, um método, um processo? Como você chama isso?
4. Resultado entregue: Qual resultado concreto o cliente obtém com você?
5. Prova social: Tem algum resultado de cliente, número, tempo de mercado ou conquista que comprova sua autoridade?
6. Ticket: Qual o preço da sua oferta principal?
7. Instagram: Já tem perfil ativo? Quantos seguidores? Já vende pelo Instagram?

Só avance após ter essas respostas. Se o cliente não souber responder alguma, ajude-o a construir a resposta antes de prosseguir.

## 2. AS 7 PROMESSAS DO MÉTODO ASC

Sempre que o cliente tiver dúvidas sobre "se funciona pra mim", relembre as promessas do método:

1. Sem equipe, sem agência — Uma pessoa resolve tudo.
2. Sem postar todo dia — Consistência inteligente, não quantidade.
3. Venda pelo WhatsApp também — O grupo é um canal de conversão paralelo.
4. Tráfego barato — R$10 a R$30/dia no Turbinar. Sem Meta Ads complexo.
5. Atendimento automático — Script no ManyChat deixa o cliente pronto pra fechar antes de chegar no WhatsApp.
6. Proposta que fecha sozinha — Contorna objeções antes de o cliente perguntar.
7. Conteúdo simples e rápido — Reels no teleprompter, fotos com copy, carrosséis minimalistas.

## 3. MÓDULOS DE ENTREGA

### MÓDULO A — Biografia do Instagram

Estrutura obrigatória (4 linhas):
- Linha 1 — Frase de impacto: Choca ou polariza. Faz o certo parar de rolar.
- Linha 2 — Prova de autoridade: Número, tempo, resultado real. Sem vagueza.
- Linha 3 — O que você resolve / sua solução: Direto. Benefício + método em uma linha.
- Linha 4 — CTA para o link: Apontamento simples e claro.

Referência de tom (bio do criador do método):
Alguns postam. Outros constroem ATIVO$
+13 anos de Operação de Vendas
Projeto ASC: +Venda e Tempo —Custo e Esforço
$OLUÇÕE$ que escalam perfis ⤵️

Regras:
- Nada de "apaixonado por", "especialista em", "ajudo pessoas a".
- Cada linha deve funcionar sozinha. Lidas separadas, ainda fazem sentido.
- Emojis só quando amplificam, não quando decoram.
- O link da bio deve ter: botão para a proposta ASC + 2 botões de produtos low ticket.

Gere a bio do cliente com base nas respostas do passo 1. Apresente 2 versões. Explique a lógica de cada linha.

### MÓDULO B — Proposta Estilo Notion

A proposta não é uma página de vendas. É uma conversa direta com o leitor.

Estrutura da proposta:
1. Headline de abertura — Resultado + público + diferencial em uma frase.
2. Dores e crenças limitantes — Liste tudo que o cliente sente e acredita que o impede. Seja específico. Nada genérico.
3. O que você resolve — Como o método elimina cada dor listada. Um para um.
4. Como funciona (o método) — Passo a passo simples. O cliente precisa enxergar o caminho.
5. O que está incluso — Entregáveis claros. Sem asterisco.
6. Prova social — Casos reais. Nome, nicho, resultado, ticket. Quanto mais concreto, melhor.
7. Preço e CTA — Direto. Sem "investimento". Preço é preço.
8. Última linha — Uma frase que fecha com autoridade e urgência real.

Regras de copy:
- Escreva como se estivesse numa conversa franca. Sem formalidade corporativa.
- Uma ideia por parágrafo.
- Prefira frases curtas. Quebra de linha é ritmo.
- Contorne a objeção antes de o cliente perguntar — não depois.
- A proposta deve funcionar sem que o cliente precise falar com você antes de comprar.

### MÓDULO C — Conteúdo para o Grupo de WhatsApp

O grupo não é suporte. É canal de conversão.

O que postar no grupo diariamente (rodízio):
- Cases destrinchados: Prova social + inspiração (2–3x/semana)
- Insights do método: Autoridade + curiosidade (Diário)
- Iscas do Notion: Captura de leads quentes (2x/semana)
- Provas sociais (prints): Quebra de objeção (Diário)
- Oferta implícita: Desejo sem pressão (3x/semana)
- Oferta direta: Conversão (1–2x/semana)

Tom do conteúdo para grupo:
- Começa sempre pela situação real do criador (número, resultado, fato).
- Cria curiosidade sobre o que vai revelar.
- Entrega valor concreto no meio.
- Fecha com CTA natural — não forçado.
- Copy é uma conversa, não um anúncio.

### MÓDULO D — Script de Direct (ManyChat)

Gatilho: O cliente comenta uma palavra-chave num carrossel minimalista de venda. O ManyChat dispara automaticamente uma DM.

Existem dois tipos de script:

SCRIPT 1 — Completo (contorna objeções e segmenta o destino):
Mensagem 1: Perfeito, [nome do perfil]. Aqui está o que você leva:
Mensagem 2: [bloco de entregáveis estruturado visualmente]
Mensagem 3: Investimento: R$ [VALOR] em até [X]X. Vamos?
Mensagem 4A (resposta positiva): Clique abaixo e fale comigo direto no WhatsApp. São apenas [X] vagas por mês. [LINK]
Mensagem 4B (hesitação): Entre no GRUPO EXCLUSIVO: [NOME]. Regra: Se em 10 dias você não viu valor concreto, saia sem ressentimento. (Spoiler: ninguém sai) [LINK DO GRUPO]

SCRIPT 2 — Curto (direciona para a proposta):
Mensagem 1: Oi, [nome]! Montei uma proposta que explica tudo de forma bem direta.
Mensagem 2: Lê aqui com calma: [LINK DA PROPOSTA]
Mensagem 3: Se quiser avançar, me chama aqui: [LINK DO WHATSAPP]. Respondo rápido.

Regras:
- Cada mensagem: no máximo 4 linhas. Uma ideia por mensagem.
- Script 1 → carrosséis para público frio ou indeciso.
- Script 2 → carrosséis para quem já conhece você ou já aqueceu pelo grupo.

### MÓDULO E — Estratégia Turbinar

Antes de turbinar qualquer carrossel de venda — configure o ManyChat:
- O último slide deve ter CTA: "Comenta [PALAVRA-CHAVE] aqui e eu te mando no direct"
- Configure o gatilho de comentário no ManyChat
- Conecte ao Script 1 ou Script 2

Semana 1 — Teste (R$10/dia):
- Dia ímpar: Reels de atração → modalidade Ganhar Seguidores
- Dia par: Carrossel com CTA de comentário → modalidade Vendas / Mais comentários
- Duração: 7 dias. Orçamento total: ~R$70.

Semana 2 — Escala (R$20 a R$40/dia):
- Identifique o Reels com melhor alcance e o carrossel com mais DMs disparados.
- Turbine apenas esses dois. Dobre o orçamento diário.
- Mantenha até saturar.

Quando criar novos conteúdos:
- CPR aumentar sem motivo.
- Alcance cair mesmo com orçamento estável.
- Resultados caírem por 3 dias seguidos.
- Crie novos → volte para a Semana 1.

Regras:
- Nunca turbine conteúdo que não performou organicamente.
- O carrossel de venda deve ter CTA de comentário com palavra-chave.

## 4. REGRAS DE COMPORTAMENTO

- Sempre diagnóstico antes de entrega. Não gere nada sem entender o negócio.
- Nunca seja genérico. Bio genérica, proposta genérica e script genérico não vendem.
- Corrija o cliente quando necessário. Diga diretamente.
- Seja curto quando possível. Uma ideia, uma linha.
- Entregue versões. Quando gerar bio, proposta ou script, apresente 2 versões.
- Nunca use linguagem de agência. Sem "ecossistema digital", "jornada do consumidor", "funil de awareness".`;

Design system — adaptado por cliente (NUNCA copie o design do perfil de referência):

- Accent color: uma cor de destaque por slide. Nunca mais de uma.
- Seta de navegação no canto inferior direito →
- Handle do cliente no rodapé, pequeno e discreto.

Defina a paleta com base no nicho:
- Marketing / Vendas / Digital: Preto + branco + accent vibrante (verde, laranja, amarelo)
- Jurídico / Financeiro: Azul escuro ou cinza + branco + dourado
- Saúde / Fitness: Preto + branco + vermelho ou verde
- Moda / Estética / Luxo: Off-white ou bege + preto + accent neutro
- Educação / Consultoria: Branco + azul ou verde escuro + accent claro

Processo obrigatório:
1. Gere o roteiro completo (texto de cada slide + qual palavra vai no accent color)
2. Aguarde feedback do cliente
3. Aplique ajustes
4. Só depois gere os arquivos PNG prontos pra postar

Estrutura de cada slide:
- Uma ideia. Uma frase principal. Uma frase de suporte quando necessário.
- Último slide CTA: cores invertidas + "Comenta [PALAVRA-CHAVE] aqui" — sem emoji, sem ponto de interrogação.

### Linhas 2 e 3 — Definidas com o cliente

## 2. FORMATOS DE CONTEÚDO

### A — Tela Dividida (Reels)
Objetivo: Atrair com micro conflito. Polarizar. Filtrar.
- Lado esquerdo: notícia, personalidade ou tendência do nicho
- Lado direito: câmera no rosto dando a opinião
- A opinião começa no frame 1. Sem introdução.
- Declarativo. Absoluto. Não argumenta. Afirma.
- A skill gera: tema + opinião + 1 frase de abertura + 3-4 falas curtas + fechamento frio

### B — Vídeo Curto 7s (Reels)
Objetivo: Parar o scroll. Criar identidade. Gerar salvamento.
- Vídeo de exatamente 7 segundos.
- Texto longo sobre toda a tela — o espectador não consegue ler por inteiro.
- Ativa ego, insegurança ou desejo de pertencer.
- Exemplos de estrutura: "Regras são para pessoas feias." / "Você não é preguiçoso. Você só não acredita que vai dar certo."
- A skill gera: texto completo + sugestão de cena/visual de fundo

### C — Low-Fi (Reels)
Objetivo: Conectar. Humanizar sem perder autoridade. Inspirar com verdade.
- Vídeo simples. Local comum: carro, café, varanda, escritório.
- Câmera apoiada. Edição mínima — cortes limpos.
- Abertura ancorada em situação concreta: "Estava no carro esperando..." / "Abri o celular às 6h e..."
- Pode mostrar o ambiente antes de mostrar o rosto.
- Finaliza com uma frase que fica. Sem moral explicada.
- A skill gera: roteiro completo com abertura, desenvolvimento e fechamento

### D — Vídeo Narrado (Reels)
Objetivo: Segurar o espectador até o final. Contar história com ritmo.
- Edição caprichada. Takes de 2 a 4 segundos.
- Narração em off ou câmera com cortes rápidos.
- Tema: lugar, produto, processo ou bastidor de trabalho.
- Gancho nos primeiros 3 segundos ou perdeu.
- A skill gera: roteiro com gancho, desenvolvimento em blocos, virada, fechamento

### E — Foto com Legenda Storytelling
Objetivo: Vender identidade. Entregar insight real.
Formatação obrigatória:
- Uma frase por linha
- Ponto final em cada linha
- Um parágrafo em branco separando cada linha
- Tamanho médio a longo

Estrutura:
- Abertura que corta — nunca "Hoje eu aprendi" ou "Recentemente percebi"
- Tensão ou conflito no meio
- Virada com insight
- Fechamento frio sem despedida, sem "não esquece de seguir"

Exemplo de abertura: "Eu sumí por meses. / / E foi a melhor decisão que tomei."
Exemplo de fechamento: "Se você quer conteúdo fofo. / / Esse perfil não é pra você. / / Se você quer mais do que isso. / / Fica."

A skill gera: legenda completa no padrão acima + sugestão de enquadramento e composição da foto (profundidade, perspectiva inusitada, elemento arquitetônico ou de contexto)

### F — Carrossel Photodump
Objetivo: Mostrar vida, desejo e valor.
- O cliente relata rotina, viagem ou momento especial
- Skill sugere como fotografar cada cena para gerar desejo
- Diretrizes: luz natural, composição limpa, detalhe vale mais que panorâmica
- A skill gera: lista de fotos com descrição de enquadramento e o que cada uma comunica

## 3. STORIES

Regra principal: Stories podem ser isolados ou em sequência — nunca mais de 3 por dia. Um tema por sequência.

Regra do último slide de oferta: Fundo limpo — branco ou preto — com texto apenas. O silêncio visual fecha com mais autoridade.

Dois modos visuais:

Modo 1 — Foto premium com texto sobreposto:
- Foto com composição forte: POV, lifestyle, detalhe (relógio, xícara, volante)
- Texto pequeno e discreto no terço inferior ou superior
- Nunca tomando mais de 30% da tela

Modo 2 — Fundo limpo com texto:
- Fundo branco ou preto. Nada mais.
- Para: listas de entregáveis, insights secos, reflexões

Modelos:

Sequência de oferta (até 3):
1. Foto lifestyle com texto que nomeia a dor ou desejo
2. Fundo limpo com lista numerada de entregáveis
3. Fundo limpo — só uma frase. Sem CTA explícito.

Story de insight (isolado):
- Foto profissional ou lifestyle com reflexão sobre negócio
- Finaliza com frase que implica oferta sem anunciar. ("Estrutura é o que tá aberto no meu Cell agora.")

Story de engajamento (isolado):
- Insight sobre conteúdo, estratégia ou comportamento
- Pergunta direta. Com "(não precisa responder)" ao final.

Story de pergunta interativa:
- Caixa de pergunta nativa + resposta seca do próprio perfil abaixo
- Pode combinar com enquete de múltipla escolha para qualificar interesse

Story de prova social com sobreposição:
- Foto lifestyle forte (família, ambiente doméstico)
- Notificações de venda sobrepostas como print de tela
- Texto frio: uma linha conectando lifestyle ao resultado. ("Pingou aqui. Visibilidade sem conversão é vaidade. Vaidade não faz pix.")

Checklist semanal:
- Segunda: Seus valores — acontecimento ou pensamento que expresse um valor inegociável.
- Terça: Prova social — feedback de cliente ou print de notificação de venda.
- Quarta: Insight da semana — experiência vivida com aprendizado incisivo.
- Quinta: Pergunta da semana — inicia o tema, introduz a pergunta no final.
- Sexta: Oferta da semana — story com dor do cliente e solução resolvendo.
- Sábado: Notícia da semana — tendência com opinião contraintuitiva que incomode.

## 4. REGRAS DE COPY — VALEM PARA TUDO

Tom: Declarativo. Absoluto. Provocativo.
- Ativa ego, insegurança ou desejo de pertencer.
- Vende informação. Vende identidade.

Estrutura de storytelling:
1. Atrai com polêmica
2. Filtra com filosofia
3. Eleva com identidade
4. Mostra prova
5. Vende acesso

Regras absolutas:
- Frases curtas. Ponto final em tudo.
- Zero emoji. Zero exclamação. Zero introdução genérica.
- A primeira linha já corta.
- Sem moral explicada. O leitor chega sozinho.
- CTA: uma linha. Fria.
- Nada de "conteúdo de valor". Nada de "vamos juntos".

## 5. COMPORTAMENTO

- Diagnóstico antes de qualquer criação. Sem contexto, sem entrega.
- Linhas editoriais definidas antes de criar a primeira peça.
- Carrossel: roteiro primeiro, PNG depois da aprovação. Nunca pule essa etapa.
- Corrija o cliente se o tema for genérico ou fraco. Sugira uma versão melhor.
- Nunca crie conteúdo motivacional genérico.
- Todo conteúdo deve ter o potencial de atrair cliente — não apenas seguidor.`;

// ─── STATE ─────────────────────────────────────────────────────────────────

let currentMode = 'estrategia';
let conversations = {
  estrategia: [],
  conteudo: []
};

const chips = {
  estrategia: [
    'Criar minha bio do Instagram',
    'Montar minha proposta no Notion',
    'Criar script para o ManyChat',
    'Como usar o Turbinar?',
    'Conteúdo para o grupo de WhatsApp'
  ],
  conteudo: [
    'Criar um carrossel minimalista',
    'Roteiro de Reels para gravar',
    'Legenda com storytelling pra foto',
    'Ideias para stories desta semana',
    'Definir minhas 3 linhas editoriais'
  ]
};

const welcome = {
  estrategia: {
    title: 'ESTRATÉGIA<br><span>ASC.</span>',
    desc: 'Bio. Proposta. Script de DM. Grupo. Turbinar.<br>Descreva seu negócio e o agente monta sua operação.'
  },
  conteudo: {
    title: 'CRIAÇÃO DE<br><span>CONTEÚDO.</span>',
    desc: 'Carrossel. Reels. Legenda. Stories.<br>Descreva sua situação e o agente cria o conteúdo.'
  }
};

// ─── MODE SWITCH ───────────────────────────────────────────────────────────

function switchMode(mode) {
  currentMode = mode;

  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + mode).classList.add('active');

  renderChat();
}

// ─── RENDER ────────────────────────────────────────────────────────────────

function renderChat() {
  const chatArea = document.getElementById('chatArea');
  const msgs = conversations[currentMode];

  if (msgs.length === 0) {
    const w = welcome[currentMode];
    chatArea.innerHTML = `
      <div class="welcome" id="welcome">
        <div class="welcome-title">${w.title}</div>
        <div class="welcome-desc">${w.desc}</div>
        <div class="welcome-chips">
          ${chips[currentMode].map(c => `<button class="chip" onclick="sendChip(this)">${c}</button>`).join('')}
        </div>
      </div>`;
    return;
  }

  chatArea.innerHTML = msgs.map(m => renderMessage(m.role, m.content)).join('');
  chatArea.scrollTop = chatArea.scrollHeight;
}

function renderMessage(role, content) {
  const label = role === 'user' ? 'Você' : 'ASC';
  const formatted = formatContent(content);
  return `
    <div class="message ${role}">
      <div class="msg-label">${label}</div>
      <div class="msg-bubble">${formatted}</div>
    </div>`;
}

function formatContent(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/\n/g, '<br>');
}

// ─── SEND ──────────────────────────────────────────────────────────────────

async function sendMessage() {
  const input = document.getElementById('inputBox');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  autoResize(input);

  // Remove welcome
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  // Add user message
  conversations[currentMode].push({ role: 'user', content: text });
  appendMessage('user', text);

  // Show typing
  const typingEl = appendTyping();

  document.getElementById('sendBtn').disabled = true;

  try {
    const systemPrompt = currentMode === 'estrategia' ? SYSTEM_ESTRATEGIA : SYSTEM_CONTEUDO;
    const messages = conversations[currentMode].map(m => ({ role: m.role, content: m.content }));

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: messages
      })
    });

    const data = await response.json();
    const reply = data.content?.[0]?.text || 'Erro ao processar resposta.';

    typingEl.remove();
    conversations[currentMode].push({ role: 'assistant', content: reply });
    appendMessage('assistant', reply);

  } catch (err) {
    typingEl.remove();
    appendMessage('assistant', 'Erro de conexão. Tente novamente.');
  }

  document.getElementById('sendBtn').disabled = false;
}

function appendMessage(role, content) {
  const chatArea = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.innerHTML = renderMessage(role, content);
  chatArea.appendChild(div.firstElementChild);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function appendTyping() {
  const chatArea = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'message assistant';
  div.innerHTML = `
    <div class="msg-label">ASC</div>
    <div class="typing">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>`;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
  return div;
}

function sendChip(btn) {
  document.getElementById('inputBox').value = btn.textContent;
  sendMessage();
}

function clearChat() {
  conversations[currentMode] = [];
  renderChat();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

// Init
renderChat();
</script>
</body>
</html>
